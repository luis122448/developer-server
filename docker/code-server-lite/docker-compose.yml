services:
  app:
    build: .
    container_name: code-server-lite
    hostname: dev-server
    env_file:
      ./.env
    environment:
      - TZ=Etc/UTC
      - PASSWORD=${PASSWORD}
    volumes:
      - ./config:/home/coder/.config
      - /srv/developer-server:/home/coder/project
    ports:
      - "8010:8080"
    restart: unless-stopped
