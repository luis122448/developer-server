services:
  app:
    build: .
    container_name: code-server-lite
    hostname: dev-server
    env_file:
      ./.env
    environment:
      PUID : 1000
      PGID : 1000
      TZ : Etc/UTC
      PASSWORD : ${PASSWORD}
      SUDO_PASSWORD : ${SUDO_PASSWORD}
      DEFAULT_WORKSPACE : /home/coder/project
    volumes:
      - ./config:/config
      - ./projects:/home/coder/project
    ports:
      - "8010:8443"
    restart: unless-stopped