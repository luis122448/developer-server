services:
  anki-desktop:
    image: chrislongros/anki-desktop:latest
    container_name: anki-desktop
    restart: unless-stopped
    ports:
      - "8006:3000"
    env_file:
      - .env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Lima}
      - ANKI_SYNC_SERVER=${ANKI_SYNC_SERVER}
    # Both mandatory for the Qt/KasmVNC desktop to render.
    security_opt:
      - seccomp=unconfined
    shm_size: 1gb
    volumes:
      - anki_desktop_config:/config

volumes:
  anki_desktop_config:
    name: anki_desktop_config
