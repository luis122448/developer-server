services:
  # Prowlarr: central indexer manager. Feeds Sonarr and Radarr.
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr-app
    ports:
      - "9696:9696"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Lima
    volumes:
      - /mnt/server/arr/prowlarr/config:/config
    restart: unless-stopped

  # Sonarr: TV series automation.
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr-app
    ports:
      - "8989:8989"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Lima
    volumes:
      - /mnt/server/arr/sonarr/config:/config
      # Mount all of /mnt/server as /data so downloads (torrent/downloads) and
      # library (video/tv) share a filesystem -> hardlinks and atomic moves.
      - /mnt/server:/data
    restart: unless-stopped

  # Radarr: movie automation.
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr-app
    ports:
      - "7878:7878"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Lima
    volumes:
      - /mnt/server/arr/radarr/config:/config
      - /mnt/server:/data
    restart: unless-stopped

  # Bazarr: subtitles for what Sonarr/Radarr manage.
  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr-app
    ports:
      - "6767:6767"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Lima
    volumes:
      - /mnt/server/arr/bazarr/config:/config
      - /mnt/server:/data
    restart: unless-stopped

networks:
  default:
    name: arr_network
