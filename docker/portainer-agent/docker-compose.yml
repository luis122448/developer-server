services:
  portainer_agent:
    # Ideally pin the SAME version as your central Portainer (portainer-ce).
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: unless-stopped
    ports:
      # The central Portainer connects TO this port. Restrict it via firewall
      # to ONLY the central server IP / VPN subnet (see README).
      - "9001:9001"
    volumes:
      # Access to THIS VM's Docker (needed to list containers/images).
      - /var/run/docker.sock:/var/run/docker.sock
      # Lets you browse the VM's volumes from the UI.
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    # environment:
    #   # Optional hardening: shared secret. If you enable it here, the central
    #   # Portainer must start with AGENT_SECRET set to the SAME value.
    #   AGENT_SECRET: ${AGENT_SECRET}
